<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Meet to Notion</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --link: #58a6ff;
      --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #58a6ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; font-weight: 600; }
    header a { color: var(--link); text-decoration: none; font-size: 14px; }
    .btn { background: var(--green); color: #fff; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .badge-success { background: rgba(63,185,80,0.2); color: var(--green); }
    .badge-error { background: rgba(248,81,73,0.2); color: var(--red); }
    .badge-partial { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .badge-running { background: rgba(88,166,255,0.2); color: var(--blue); }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .stat { display: inline-block; text-align: center; margin-right: 32px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--muted); }
    .error-box { background: rgba(248,81,73,0.1); border: 1px solid var(--red); border-radius: 6px; padding: 12px; font-size: 13px; color: var(--red); white-space: pre-wrap; font-family: monospace; }
    #error-panel { display: none; position: fixed; bottom: 16px; right: 16px; max-width: 480px; z-index: 100; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/dashboard" style="color:var(--text)">Meet to Notion</a></h1>
    <div style="display:flex;align-items:center;gap:12px">
      <button class="btn" id="triggerBtn" onclick="triggerRun()">Executar agora</button>
    </div>
  </header>
  <div class="container">
    {{CONTENT}}
  </div>
  <div id="error-panel"></div>
  <script>
    async function triggerRun() {
      const btn = document.getElementById('triggerBtn');
      btn.disabled = true;
      btn.textContent = 'Executando...';
      try {
        const res = await fetch('/dashboard/trigger', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || JSON.stringify(data.errors || data, null, 2));
        } else {
          btn.textContent = 'Concluido!';
          setTimeout(() => location.reload(), 2000);
        }
      } catch (err) {
        showError(err.message);
      }
    }
    function showError(msg) {
      const panel = document.getElementById('error-panel');
      panel.style.display = 'block';
      panel.innerHTML = '<div class="error-box" style="position:relative;padding-right:32px">' +
        '<button onclick="this.parentElement.parentElement.style.display=\'none\'" style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--red);cursor:pointer;font-size:18px">x</button>' +
        msg + '</div>';
      const btn = document.getElementById('triggerBtn');
      btn.disabled = false;
      btn.textContent = 'Executar agora';
    }
  </script>
</body>
</html>
